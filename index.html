<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Court Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #39FF14; /* สีเขียวนีออนสนามแบด */
            --dark-bg: #0f1110;
            --card-bg: #1a1d1b;
            --text-color: #ffffff;
            --input-bg: #252a27;
            --accent-color: #2ecc71;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2e1a 0%, #0f1110 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 15px rgba(57, 255, 20, 0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(57, 255, 20, 0.2);
            position: relative;
            overflow: hidden;
        }

        /* ตกแต่งแถบสีด้านบน */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-green), #00d2ff);
        }

        h2 {
            text-align: center;
            color: var(--primary-green);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.subtitle {
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.6rem;
            font-size: 0.95rem;
            color: var(--primary-green);
            font-weight: 300;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: var(--input-bg);
            color: white;
            box-sizing: border-box;
            transition: all 0.3s ease;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-green);
            box-shadow: 0 0 8px rgba(57, 255, 20, 0.3);
            background-color: #2d3530;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-green), #2ecc71);
            color: #000;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s transform;
            margin-top: 1rem;
            box-shadow: 0 4px 15px rgba(57, 255, 20, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(57, 255, 20, 0.4);
            filter: brightness(1.1);
        }

        button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        #success-box {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
            background: rgba(57, 255, 20, 0.15);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--primary-green);
            animation: fadeIn 0.5s ease;
        }

        .success-text {
            color: var(--primary-green);
            font-weight: bold;
            font-size: 1.1rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏸 Booking Court</h2>
    <p class="subtitle">ลงชื่อจองก๊วนแบดมินตัน</p>
    
    <form id="bookingForm">
        <div class="form-group">
            <label for="name">ชื่อ-นามสกุล / ชื่อเล่น</label>
            <input type="text" id="name" name="name" placeholder="ระบุชื่อของคุณ" required>
        </div>
        
        <div class="form-group">
            <label for="note">หมายเหตุ</label>
            <textarea id="note" name="note" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม (ถ้ามี) เช่น มือใหม่, มาเลท"></textarea>
        </div>
        
        <button type="submit" id="submitBtn">ลงชื่อจองก๊วน</button>
    </form>

    <div id="success-box">
        <div class="success-text">🎉 ลงชื่อสำเร็จ!</div>
        <div style="font-size: 0.8rem; color: #ccc; margin-top: 5px;">ข้อมูลของคุณถูกบันทึกลงระบบแล้ว</div>
    </div>
</div>

<script>
    const form = document.getElementById('bookingForm');
    const successBox = document.getElementById('success-box');
    const submitBtn = document.getElementById('submitBtn');

    // URL ของ Google Apps Script ที่คุณให้มา
    const API_URL = 'https://script.google.com/macros/s/AKfycbyPqHyPnAUSkt3ChUG_NmEXeiWLWq2lX1w0uMwdavApOsO4oZ8FkPVpmV1tINOWtZAL/exec';

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        // เปลี่ยนสถานะปุ่ม
        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังบันทึกข้อมูล...';

        const formData = {
            name: document.getElementById('name').value,
            note: document.getElementById('note').value,
            date: new Date().toLocaleString('th-TH')
        };

        // สำหรับ Google Apps Script การใช้ fetch แบบปกติอาจติด CORS 
        // หากฝั่ง Script ไม่ได้ตั้งค่าไว้อย่างสมบูรณ์ แนะนำให้ใช้ส่งแบบ Form Data 
        // หรือถ้าส่งเป็น JSON ให้จัดการดังนี้:

        fetch(API_URL, {
            method: 'POST',
            mode: 'no-cors', // สำคัญมากสำหรับ Google Apps Script หากไม่ได้ทำ Web App แบบจัดการ CORS
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(response => {
            // เนื่องจากใช้ no-cors เราจะไม่เห็น response body 
            // แต่ถ้าส่งผ่าน ข้อมูลจะไปปรากฏใน Google Sheets ของคุณ
            showSuccess();
        })
        .catch(error => {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
            submitBtn.disabled = false;
            submitBtn.innerText = 'ลงชื่อจองก๊วน';
        });
    });

    function showSuccess() {
        form.style.display = 'none';
        successBox.style.display = 'block';
        
        // รีเซ็ตฟอร์มหลังจาก 3 วินาที เผื่อต้องการลงชื่อเพิ่ม
        setTimeout(() => {
            form.reset();
            form.style.display = 'block';
            successBox.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.innerText = 'ลงชื่อจองก๊วน';
        }, 4000);
    }
</script>

</body>
</html>
