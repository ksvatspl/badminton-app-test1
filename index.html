<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Court Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #39FF14; 
            --dark-bg: #0f1110;
            --card-bg: #1a1d1b;
            --text-color: #ffffff;
            --input-bg: #252a27;
            --border-color: rgba(57, 255, 20, 0.2);
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2e1a 0%, #0f1110 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid var(--border-color);
            position: relative;
            margin-bottom: 2rem;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-green), #00d2ff);
            border-radius: 20px 20px 0 0;
        }

        h2 { text-align: center; color: var(--primary-green); margin-top: 0; }
        p.subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.6rem; color: var(--primary-green); font-size: 0.9rem; }

        input, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: var(--input-bg);
            color: white;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary-green); outline: none; }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-green), #2ecc71);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* --- ส่วนของตารางรายชื่อ --- */
        .list-section {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .refresh-btn {
            width: auto;
            margin-top: 0;
            padding: 5px 15px;
            font-size: 0.8rem;
            background: transparent;
            color: var(--primary-green);
            border: 1px solid var(--primary-green);
        }

        .refresh-btn:hover { background: rgba(57, 255, 20, 0.1); }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            color: var(--primary-green);
            border-bottom: 1px solid var(--border-color);
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        tr:last-child td { border-bottom: none; }
        .loading-text { text-align: center; color: #888; padding: 20px; }

        #success-box {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
            background: rgba(57, 255, 20, 0.15);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--primary-green);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏸 Booking Court</h2>
    <p class="subtitle">ลงชื่อจองก๊วนแบดมินตัน</p>
    
    <form id="bookingForm">
        <div class="form-group">
            <label for="name">ชื่อ-นามสกุล / ชื่อเล่น</label>
            <input type="text" id="name" placeholder="ระบุชื่อของคุณ" required>
        </div>
        
        <div class="form-group">
            <label for="note">หมายเหตุ</label>
            <textarea id="note" rows="2" placeholder="ระบุรายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
        </div>
        
        <button type="submit" id="submitBtn">ลงชื่อจองก๊วน</button>
    </form>

    <div id="success-box">
        <div style="color: var(--primary-green); font-weight: bold;">🎉 ลงชื่อสำเร็จ!</div>
        <div style="font-size: 0.8rem; color: #ccc;">ข้อมูลบันทึกลง Google Sheets แล้ว</div>
    </div>
</div>

<div class="list-section">
    <div class="list-header">
        <h3 style="margin:0; color: var(--primary-green);">รายชื่อที่จองแล้ว</h3>
        <button class="refresh-btn" onclick="fetchData()">🔄 รีเฟรช</button>
    </div>
    <div style="overflow-x: auto;">
        <table id="bookingTable">
            <thead>
                <tr>
                    <th>ลำดับ</th>
                    <th>ชื่อ</th>
                    <th>หมายเหตุ</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="3" class="loading-text">กำลังโหลดข้อมูล...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const form = document.getElementById('bookingForm');
    const successBox = document.getElementById('success-box');
    const submitBtn = document.getElementById('submitBtn');
    const tableBody = document.getElementById('tableBody');

    // URL สำหรับเรียกใช้งาน
    const API_URL = 'https://script.google.com/macros/s/AKfycbw6pgpanHwtbfnzWPsFocrCSaGTi_vm5FvlN79zPNNJ1eLiOK2Z8ICbYRay8o-chFuj/exec'; 

    // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
    window.onload = fetchData;

    function fetchData() {
        tableBody.innerHTML = '<tr><td colspan="3" class="loading-text">กำลังดึงข้อมูลล่าสุด...</td></tr>';
        
        fetch(API_URL)
            .then(response => response.json())
            .then(data => {
                renderTable(data);
            })
            .catch(error => {
                console.error('Error:', error);
                tableBody.innerHTML = '<tr><td colspan="3" class="loading-text" style="color: #ff4d4d;">ไม่สามารถโหลดข้อมูลได้</td></tr>';
            });
    }

    function renderTable(data) {
        if (!data || data.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="3" class="loading-text">ยังไม่มีรายชื่อการจอง</td></tr>';
            return;
        }

        tableBody.innerHTML = '';
        data.forEach((item, index) => {
            const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td style="color: var(--primary-green);">${item.name}</td>
                    <td style="color: #ccc; font-size: 0.8rem;">${item.note || '-'}</td>
                </tr>
            `;
            tableBody.insertAdjacentHTML('beforeend', row);
        });
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังบันทึกข้อมูล...';

        const nameValue = document.getElementById('name').value;
        const noteValue = document.getElementById('note').value;
        const dateValue = new Date().toLocaleString('th-TH');

        const finalUrl = API_URL + 
                         "?name=" + encodeURIComponent(nameValue) + 
                         "&note=" + encodeURIComponent(noteValue) + 
                         "&date=" + encodeURIComponent(dateValue);

        fetch(finalUrl, {
            method: 'POST',
            mode: 'no-cors'
        })
        .then(() => {
            showSuccess();
            // หลังจากจองเสร็จ รอสักครู่แล้วโหลดข้อมูลใหม่
            setTimeout(fetchData, 1000);
        })
        .catch(error => {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
            submitBtn.disabled = false;
        });
    });

    function showSuccess() {
        form.style.display = 'none';
        successBox.style.display = 'block';
        setTimeout(() => {
            form.reset();
            form.style.display = 'block';
            successBox.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.innerText = 'ลงชื่อจองก๊วน';
        }, 3000);
    }
</script>

</body>
</html>
