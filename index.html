<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Court Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #39FF14; 
            --dark-bg: #0f1110;
            --card-bg: #1a1d1b;
            --text-color: #ffffff;
            --input-bg: #252a27;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2e1a 0%, #0f1110 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(57, 255, 20, 0.2);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-green), #00d2ff);
        }

        h2 { text-align: center; color: var(--primary-green); margin-bottom: 0.5rem; }
        p.subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.6rem; color: var(--primary-green); }

        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #333;
            background-color: var(--input-bg);
            color: white;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-green), #2ecc71);
            color: #000;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        #success-box {
            display: none;
            margin-top: 1.5rem;
            text-align: center;
            background: rgba(57, 255, 20, 0.15);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--primary-green);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🏸 Booking Court</h2>
    <p class="subtitle">ลงชื่อจองก๊วนแบดมินตัน</p>
    
    <form id="bookingForm">
        <div class="form-group">
            <label for="name">ชื่อ-นามสกุล / ชื่อเล่น</label>
            <input type="text" id="name" placeholder="ระบุชื่อของคุณ" required>
        </div>
        
        <div class="form-group">
            <label for="note">หมายเหตุ</label>
            <textarea id="note" rows="3" placeholder="ระบุรายละเอียดเพิ่มเติม (ถ้ามี)"></textarea>
        </div>
        
        <button type="submit" id="submitBtn">ลงชื่อจองก๊วน</button>
    </form>

    <div id="success-box">
        <div style="color: var(--primary-green); font-weight: bold;">🎉 ลงชื่อสำเร็จ!</div>
        <div style="font-size: 0.8rem; color: #ccc;">ข้อมูลบันทึกลง Google Sheets แล้ว</div>
    </div>
</div>

<script>
    <script>
    const form = document.getElementById('bookingForm');
    const successBox = document.getElementById('success-box');
    const submitBtn = document.getElementById('submitBtn');

    // *** วาง URL ล่าสุดที่คุณเพิ่ง Deploy เมื่อกี้ตรงนี้ ***
    const API_URL = 'https://script.google.com/macros/s/AKfycbzVo-HhVyvnvKccy8opUVgQ3jsaK8oVRA0AVJZ-rStl-SJEFamI34b5pfl5La16-86j/exec'; 

    form.addEventListener('submit', function(e) {
        e.preventDefault();

        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังบันทึกข้อมูล...';

        const nameValue = document.getElementById('name').value;
        const noteValue = document.getElementById('note').value;
        const dateValue = new Date().toLocaleString('th-TH');

        // ส่งข้อมูลแบบดั้งเดิม (Query String) เพื่อให้ GAS รับผ่าน e.parameter ได้ 100%
        const finalUrl = API_URL + 
                         "?name=" + encodeURIComponent(nameValue) + 
                         "&note=" + encodeURIComponent(noteValue) + 
                         "&date=" + encodeURIComponent(dateValue);

        fetch(finalUrl, {
            method: 'POST',
            mode: 'no-cors'
        })
        .then(() => {
            showSuccess();
        })
        .catch(error => {
            console.error('Error:', error);
            alert('เกิดข้อผิดพลาด');
            submitBtn.disabled = false;
        });
    });

    function showSuccess() {
        form.style.display = 'none';
        successBox.style.display = 'block';
        setTimeout(() => {
            form.reset();
            form.style.display = 'block';
            successBox.style.display = 'none';
            submitBtn.disabled = false;
            submitBtn.innerText = 'ลงชื่อจองก๊วน';
        }, 3000);
    }
</script>

</body>
</html>
