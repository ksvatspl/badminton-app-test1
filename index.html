<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Pro SPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #39FF14; 
            --dark-bg: #0f1110;
            --card-bg: #1a1d1b;
            --text-color: #ffffff;
            --input-bg: #252a27;
            --nav-bg: #121412;
            --vs-color: #ff4d4d;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2e1a 0%, #0f1110 100%);
            color: var(--text-color);
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Navigation --- */
        nav {
            width: 100%; background: var(--nav-bg); display: flex; justify-content: center;
            border-bottom: 1px solid rgba(57, 255, 20, 0.2); position: sticky; top: 0; z-index: 100;
        }
        .nav-item {
            padding: 1rem 1.2rem; cursor: pointer; color: #888; font-weight: 600;
            transition: 0.3s; position: relative; font-size: 0.9rem;
        }
        .nav-item.active { color: var(--primary-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: var(--primary-green); box-shadow: 0 0 10px var(--primary-green);
        }

        /* --- Layout --- */
        .content-section { display: none; width: 100%; max-width: 550px; padding: 1.5rem 1rem; animation: fadeIn 0.4s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .container {
            background-color: var(--card-bg); padding: 1.5rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); border: 1px solid rgba(57, 255, 20, 0.2);
        }
        h2 { color: var(--primary-green); text-align: center; margin-top: 0; font-size: 1.4rem; }

        /* --- Match Form --- */
        .match-grid { display: grid; grid-template-columns: 1fr 40px 1fr; gap: 10px; align-items: center; margin-bottom: 1.5rem; }
        .team-box { display: flex; flex-direction: column; gap: 8px; }
        .vs-circle { background: var(--vs-color); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.8rem; margin: auto; }
        
        select {
            width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #333;
            background: var(--input-bg); color: white; font-family: 'Kanit';
        }

        /* --- Winner Selection --- */
        .winner-selector { display: flex; gap: 10px; margin-bottom: 1.5rem; }
        .win-btn {
            flex: 1; padding: 12px; border: 1px solid #444; background: #222; color: #888;
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; text-align: center;
        }
        .win-btn.selected {
            background: rgba(57, 255, 20, 0.1); border-color: var(--primary-green); color: var(--primary-green);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }

        button.main-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-green), #2ecc71);
            color: #000; font-weight: 600; cursor: pointer;
        }

        /* --- History List --- */
        .history-item {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px;
            margin-bottom: 8px; border-left: 4px solid #444; font-size: 0.85rem;
        }
        .history-item.winA { border-left-color: var(--primary-green); }
        .history-item.winB { border-left-color: var(--vs-color); }
        .winner-tag { color: var(--primary-green); font-weight: bold; margin-left: 5px; }

        #success-msg { display: none; color: var(--primary-green); text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active" onclick="switchTab('booking')">ลงชื่อจอง</div>
        <div class="nav-item" onclick="switchTab('list')">รายชื่อสมาชิก</div>
        <div class="nav-item" onclick="switchTab('match')">จดผลการแข่ง</div>
    </nav>

    <section id="booking-section" class="content-section active">
        <div class="container">
            <h2>🏸 ลงชื่อเข้าก๊วน</h2>
            <form id="bookingForm">
                <input type="text" id="name" placeholder="ชื่อของคุณ" required style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1fr solid #333; background:var(--input-bg); color:white;">
                <textarea id="note" rows="2" placeholder="หมายเหตุ (ถ้ามี)" style="width:100%; padding:12px; margin-bottom:15px; border-radius:10px; border:1fr solid #333; background:var(--input-bg); color:white;"></textarea>
                <button type="submit" id="submitBtn" class="main-btn">ยืนยันลงชื่อ</button>
            </form>
        </div>
    </section>

    <section id="list-section" class="content-section">
        <div class="container">
            <h2>📋 สมาชิกวันนี้</h2>
            <div id="tableContent">กำลังโหลด...</div>
        </div>
    </section>

    <section id="match-section" class="content-section">
        <div class="container">
            <h2>🏆 บันทึกผลการแข่ง</h2>
            
            <div class="match-grid">
                <div class="team-box">
                    <select id="p1"><option value="">เลือกผู้เล่น 1</option></select>
                    <select id="p2"><option value="">เลือกผู้เล่น 2</option></select>
                </div>
                <div class="vs-circle">VS</div>
                <div class="team-box">
                    <select id="p3"><option value="">เลือกผู้เล่น 3</option></select>
                    <select id="p4"><option value="">เลือกผู้เล่น 4</option></select>
                </div>
            </div>

            <div class="winner-selector">
                <div id="btnWinA" class="win-btn" onclick="selectWinner('Team A')">ทีม A ชนะ</div>
                <div id="btnWinB" class="win-btn" onclick="selectWinner('Team B')">ทีม B ชนะ</div>
            </div>

            <button onclick="saveMatch()" id="saveMatchBtn" class="main-btn">บันทึกผลการแข่งขัน</button>
            <div id="success-msg">✅ บันทึกเรียบร้อย!</div>

            <h3 style="margin-top:2rem; font-size:1rem; color:var(--primary-green);">🕒 5 นัดล่าสุด</h3>
            <div id="matchHistory"></div>
        </div>
    </section>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzBkMOGMOEIGEDPCk5RfKpuhFHxNR8EChP9-Ppaj3s59ZCZdgSLgvL5Jz49UWRIKnUw/exec';
        let memberList = [];
        let selectedWinner = '';

        function switchTab(tabName) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(tabName + '-section').classList.add('active');

            if(tabName === 'list' || tabName === 'match') fetchData();
        }

        // ดึงข้อมูลสมาชิกและประวัติการแข่ง
        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // เก็บรายชื่อไว้ทำ Dropdown
                memberList = data.members || data; // ปรับตามโครงสร้าง JSON ของคุณ
                updateDropdowns();
                renderMemberList(memberList);
                
                if(data.matches) renderHistory(data.matches);
            } catch (e) { console.error("Load error", e); }
        }

        function updateDropdowns() {
            const selects = ['p1', 'p2', 'p3', 'p4'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                const currentVal = el.value;
                el.innerHTML = `<option value="">เลือกผู้เล่น</option>`;
                memberList.forEach(m => {
                    el.innerHTML += `<option value="${m.name}">${m.name}</option>`;
                });
                el.value = currentVal;
            });
        }

        function renderMemberList(list) {
            let html = '<table style="width:100%">';
            list.forEach((m, i) => {
                html += `<tr style="border-bottom:1px solid #333"><td style="padding:10px">${i+1}. ${m.name}</td><td style="color:#888; font-size:0.8rem">${m.note||''}</td></tr>`;
            });
            document.getElementById('tableContent').innerHTML = html + '</table>';
        }

        function selectWinner(team) {
            selectedWinner = team;
            document.getElementById('btnWinA').classList.toggle('selected', team === 'Team A');
            document.getElementById('btnWinB').classList.toggle('selected', team === 'Team B');
        }

        async function saveMatch() {
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            const p3 = document.getElementById('p3').value;
            const p4 = document.getElementById('p4').value;

            if(!p1 || !p3 || !selectedWinner) return alert("กรุณาเลือกผู้เล่นและทีมชนะ");

            const btn = document.getElementById('saveMatchBtn');
            btn.disabled = true; btn.innerText = "กำลังบันทึก...";

            const params = `?action=addMatch&p1=${encodeURIComponent(p1)}&p2=${encodeURIComponent(p2)}&p3=${encodeURIComponent(p3)}&p4=${encodeURIComponent(p4)}&winner=${selectedWinner}`;
            
            try {
                await fetch(API_URL + params, { method: 'POST', mode: 'no-cors' });
                document.getElementById('success-msg').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('success-msg').style.display = 'none';
                    btn.disabled = false; btn.innerText = "บันทึกผลการแข่งขัน";
                    fetchData(); // รีเฟรชประวัติ
                }, 2000);
            } catch (e) { alert("เกิดข้อผิดพลาด"); btn.disabled = false; }
        }

        function renderHistory(matches) {
            const container = document.getElementById('matchHistory');
            container.innerHTML = '';
            matches.slice(-5).reverse().forEach(m => {
                const isA = m.winner === 'Team A';
                container.innerHTML += `
                    <div class="history-item ${isA ? 'winA' : 'winB'}">
                        <span style="${isA?'color:var(--primary-green)':''}">${m.p1}, ${m.p2}</span> 
                        <span style="color:var(--vs-color)"> VS </span> 
                        <span style="${!isA?'color:var(--primary-green)':''}">${m.p3}, ${m.p4}</span>
                        <span class="winner-tag">${isA ? '← ทีม A ชนะ' : 'ทีม B ชนะ →'}</span>
                    </div>
                `;
            });
        }

        // ส่งข้อมูลหน้าแรก
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const note = document.getElementById('note').value;
            await fetch(`${API_URL}?name=${encodeURIComponent(name)}&note=${encodeURIComponent(note)}`, {method:'POST', mode:'no-cors'});
            switchTab('list');
        });
    </script>
</body>
</html>
