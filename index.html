<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Court SPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #39FF14; 
            --dark-bg: #0f1110;
            --card-bg: #1a1d1b;
            --text-color: #ffffff;
            --input-bg: #252a27;
            --nav-bg: #121412;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2e1a 0%, #0f1110 100%);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Navigation Tab --- */
        nav {
            width: 100%;
            background-color: var(--nav-bg);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid rgba(57, 255, 20, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-item {
            padding: 1rem 2rem;
            cursor: pointer;
            color: #888;
            font-weight: 600;
            transition: 0.3s;
            position: relative;
        }

        .nav-item.active {
            color: var(--primary-green);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary-green);
            box-shadow: 0 0 10px var(--primary-green);
        }

        /* --- Content Sections --- */
        .content-section {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 2rem 1rem;
            animation: fadeIn 0.4s ease-in-out;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        h2 { color: var(--primary-green); text-align: center; margin-top: 0; }
        
        /* --- Form Style --- */
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--primary-green); font-size: 0.9rem; }
        input, textarea {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: var(--input-bg); color: white; box-sizing: border-box; font-family: 'Kanit';
        }
        button.main-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-green), #2ecc71);
            color: #000; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button.main-btn:active { transform: scale(0.97); }

        /* --- Table Style --- */
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; color: var(--primary-green); border-bottom: 1px solid #333; padding: 12px 8px; }
        td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.95rem; }
        .loading { text-align: center; color: #888; padding: 2rem; }

        #success-box {
            display: none; text-align: center; background: rgba(57, 255, 20, 0.1);
            padding: 1rem; border-radius: 10px; border: 1px solid var(--primary-green); margin-top: 1rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active" onclick="switchTab('booking')">ลงชื่อจอง</div>
        <div class="nav-item" onclick="switchTab('list')">รายชื่อสมาชิก</div>
    </nav>

    <section id="booking-section" class="content-section active">
        <div class="container">
            <h2>🏸 Booking Court</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label>ชื่อ-นามสกุล / ชื่อเล่น</label>
                    <input type="text" id="name" placeholder="ระบุชื่อของคุณ" required>
                </div>
                <div class="form-group">
                    <label>หมายเหตุ</label>
                    <textarea id="note" rows="2" placeholder="เช่น มาสาย, ฝากจอง 2 ที่"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="main-btn">ยืนยันลงชื่อจอง</button>
            </form>
            <div id="success-box">🎉 บันทึกข้อมูลสำเร็จ!</div>
        </div>
    </section>

    <section id="list-section" class="content-section">
        <div class="container">
            <h2>📋 รายชื่อสมาชิก</h2>
            <div id="loading" class="loading">กำลังดึงข้อมูลจากสนาม...</div>
            <div style="overflow-x: auto;">
                <table id="memberTable" style="display: none;">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>รายชื่อ</th>
                            <th>หมายเหตุ</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <button onclick="fetchData()" class="main-btn" style="margin-top: 1.5rem; background: transparent; border: 1px solid var(--primary-green); color: var(--primary-green);">รีเฟรชข้อมูล</button>
        </div>
    </section>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw6pgpanHwtbfnzWPsFocrCSaGTi_vm5FvlN79zPNNJ1eLiOK2Z8ICbYRay8o-chFuj/exec';

        // ฟังก์ชันสลับ Tab
        function switchTab(tabName) {
            // จัดการ UI ของ Nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(tabName === 'booking' ? 'ลงชื่อ' : 'รายชื่อ')) {
                    item.classList.add('active');
                }
            });

            // จัดการการแสดงผล Section
            document.querySelectorAll('.content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById(tabName + '-section').classList.add('active');

            // ถ้าสลับมาหน้า List ให้โหลดข้อมูลทันที
            if(tabName === 'list') {
                fetchData();
            }
        }

        // ฟังก์ชันดึงข้อมูล (GET)
        async function fetchData() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('memberTable');
            const tbody = document.getElementById('tableBody');

            loading.style.display = 'block';
            table.style.display = 'none';
            tbody.innerHTML = '';

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                data.forEach((item, index) => {
                    const row = `<tr>
                        <td>${index + 1}</td>
                        <td style="color: var(--primary-green); font-weight: 600;">${item.name}</td>
                        <td style="color: #bbb;">${item.note || '-'}</td>
                    </tr>`;
                    tbody.insertAdjacentHTML('beforeend', row);
                });

                loading.style.display = 'none';
                table.style.display = 'table';
            } catch (error) {
                loading.innerText = '❌ เกิดข้อผิดพลาดในการโหลดข้อมูล';
                console.error(error);
            }
        }

        // ฟังก์ชันส่งข้อมูล (POST)
        const form = document.getElementById('bookingForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const successBox = document.getElementById('success-box');

            submitBtn.disabled = true;
            submitBtn.innerText = 'กำลังส่งข้อมูล...';

            const name = document.getElementById('name').value;
            const note = document.getElementById('note').value;
            const date = new Date().toLocaleString('th-TH');

            const finalUrl = `${API_URL}?name=${encodeURIComponent(name)}&note=${encodeURIComponent(note)}&date=${encodeURIComponent(date)}`;

            fetch(finalUrl, { method: 'POST', mode: 'no-cors' })
                .then(() => {
                    successBox.style.display = 'block';
                    form.reset();
                    setTimeout(() => {
                        successBox.style.display = 'none';
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'ยืนยันลงชื่อจอง';
                        switchTab('list'); // จองเสร็จเด้งไปหน้าดูรายชื่อทันที
                    }, 1500);
                })
                .catch(err => {
                    alert('เกิดข้อผิดพลาด');
                    submitBtn.disabled = false;
                });
        });
    </script>
</body>
</html>
