<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Pro SPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-green: #39FF14; 
            --dark-bg: #0f1110;
            --card-bg: #1a1d1b;
            --text-color: #ffffff;
            --input-bg: #252a27;
            --nav-bg: #121412;
            --vs-color: #ff4d4d;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at 50% 50%, #1a2e1a 0%, #0f1110 100%);
            color: var(--text-color);
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- Navigation --- */
        nav {
            width: 100%; background: var(--nav-bg); display: flex; justify-content: center;
            border-bottom: 1px solid rgba(57, 255, 20, 0.2); position: sticky; top: 0; z-index: 100;
        }
        .nav-item {
            padding: 1rem 1.2rem; cursor: pointer; color: #888; font-weight: 600;
            transition: 0.3s; position: relative; font-size: 0.9rem;
        }
        .nav-item.active { color: var(--primary-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .nav-item.active::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: var(--primary-green); box-shadow: 0 0 10px var(--primary-green);
        }

        /* --- Layout --- */
        .content-section { display: none; width: 100%; max-width: 500px; padding: 1.5rem 1rem; animation: fadeIn 0.4s; }
        .content-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .container {
            background-color: var(--card-bg); padding: 2rem; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5); border: 1px solid rgba(57, 255, 20, 0.2);
            box-sizing: border-box;
        }
        h2 { color: var(--primary-green); text-align: center; margin-top: 0; font-size: 1.4rem; margin-bottom: 1.5rem; }

        /* --- Form Elements --- */
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--primary-green); font-size: 0.9rem; }
        input, textarea, select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333;
            background: var(--input-bg); color: white; box-sizing: border-box; font-family: 'Kanit';
            font-size: 1rem;
        }
        input:focus, textarea:focus { border-color: var(--primary-green); outline: none; }

        button.main-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, var(--primary-green), #2ecc71);
            color: #000; font-weight: 600; cursor: pointer; transition: 0.2s;
            font-size: 1rem; margin-top: 0.5rem;
        }
        button.main-btn:active { transform: scale(0.98); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }

        /* --- Match History & Table --- */
        .history-item {
            background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px;
            margin-bottom: 8px; border-left: 4px solid #444; font-size: 0.85rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-item.winA { border-left-color: var(--primary-green); }
        .history-item.winB { border-left-color: var(--vs-color); }
        
        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* SweetAlert Custom Style */
        .swal2-popup { background: var(--card-bg) !important; color: white !important; border: 1px solid var(--primary-green); }
        .swal2-title { color: var(--primary-green) !important; }
    </style>
</head>
<body>

    <nav>
        <div id="nav-booking" class="nav-item active" onclick="switchTab('booking')">ลงชื่อจอง</div>
        <div id="nav-list" class="nav-item" onclick="switchTab('list')">รายชื่อสมาชิก</div>
        <div id="nav-match" class="nav-item" onclick="switchTab('match')">จดผลการแข่ง</div>
    </nav>

    <section id="booking-section" class="content-section active">
        <div class="container">
            <h2>🏸 ลงชื่อเข้าก๊วน</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label>ชื่อ-นามสกุล / ชื่อเล่น</label>
                    <input type="text" id="name" placeholder="ระบุชื่อของคุณ" required>
                </div>
                <div class="form-group">
                    <label>หมายเหตุ</label>
                    <textarea id="note" rows="2" placeholder="เช่น มาสาย, ฝากจอง 2 ที่"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="main-btn">ยืนยันลงชื่อจอง</button>
            </form>
        </div>
    </section>

    <section id="list-section" class="content-section">
        <div class="container">
            <h2>📋 สมาชิกวันนี้</h2>
            <div id="tableContent" style="text-align: center; color: #888;">กำลังโหลดรายชื่อ...</div>
        </div>
    </section>

    <section id="match-section" class="content-section">
        <div class="container">
            <h2>🏆 บันทึกผลการแข่ง</h2>
            <div style="display: grid; grid-template-columns: 1fr 40px 1fr; gap: 10px; align-items: center; margin-bottom: 1.5rem;">
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <select id="p1"><option value="">ผู้เล่น 1</option></select>
                    <select id="p2"><option value="">ผู้เล่น 2</option></select>
                </div>
                <div style="text-align: center; font-weight: bold; color: var(--vs-color);">VS</div>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <select id="p3"><option value="">ผู้เล่น 3</option></select>
                    <select id="p4"><option value="">ผู้เล่น 4</option></select>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                <button id="btnWinA" class="main-btn" style="background: #222; color: #888; border: 1px solid #444;" onclick="setWinner('Team A')">ทีม A ชนะ</button>
                <button id="btnWinB" class="main-btn" style="background: #222; color: #888; border: 1px solid #444;" onclick="setWinner('Team B')">ทีม B ชนะ</button>
            </div>

            <button onclick="saveMatch()" id="saveMatchBtn" class="main-btn">บันทึกผลการแข่งขัน</button>
            
            <h3 style="margin-top:2rem; font-size:1rem; color:var(--primary-green); border-bottom: 1px solid #333; padding-bottom: 5px;">🕒 5 นัดล่าสุด</h3>
            <div id="matchHistory"></div>
        </div>
    </section>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbw6pgpanHwtbfnzWPsFocrCSaGTi_vm5FvlN79zPNNJ1eLiOK2Z8ICbYRay8o-chFuj/exec';
        let memberList = [];
        let winner = '';

        function switchTab(tabName) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + tabName).classList.add('active');
            
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(tabName + '-section').classList.add('active');

            if(tabName === 'list' || tabName === 'match') fetchData();
        }

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                memberList = data.members || data;
                renderMembers();
                updateDropdowns();
                if(data.matches) renderHistory(data.matches);
            } catch (e) { console.error(e); }
        }

        function renderMembers() {
            let html = '<table>';
            memberList.forEach((m, i) => {
                html += `<tr><td>${i+1}. <b>${m.name}</b></td><td style="color:#888; font-size:0.8rem; text-align:right;">${m.note||''}</td></tr>`;
            });
            document.getElementById('tableContent').innerHTML = html + '</table>';
        }

        function updateDropdowns() {
            ['p1', 'p2', 'p3', 'p4'].forEach(id => {
                const el = document.getElementById(id);
                const val = el.value;
                el.innerHTML = '<option value="">เลือกผู้เล่น</option>' + 
                    memberList.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
                el.value = val;
            });
        }

        function setWinner(team) {
            winner = team;
            document.getElementById('btnWinA').style.borderColor = team === 'Team A' ? 'var(--primary-green)' : '#444';
            document.getElementById('btnWinA').style.color = team === 'Team A' ? 'var(--primary-green)' : '#888';
            document.getElementById('btnWinB').style.borderColor = team === 'Team B' ? 'var(--primary-green)' : '#444';
            document.getElementById('btnWinB').style.color = team === 'Team B' ? 'var(--primary-green)' : '#888';
        }

        // ส่งข้อมูลหน้าลงชื่อ
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'กำลังบันทึก...';

            const name = document.getElementById('name').value;
            const note = document.getElementById('note').value;
            const url = `${API_URL}?name=${encodeURIComponent(name)}&note=${encodeURIComponent(note)}`;

            try {
                await fetch(url, { method: 'POST', mode: 'no-cors' });
                // แสดง Msgbox
                Swal.fire({
                    title: 'ลงชื่อสำเร็จ!',
                    text: 'เตรียมไม้ให้พร้อม แล้วเจอกันที่คอร์ท',
                    icon: 'success',
                    confirmButtonColor: '#39FF14',
                    confirmButtonText: 'ตกลง'
                }).then(() => {
                    document.getElementById('bookingForm').reset();
                    btn.disabled = false;
                    btn.innerText = 'ยืนยันลงชื่อจอง';
                    switchTab('list');
                });
            } catch (err) {
                alert('มีบางอย่างผิดพลาด');
                btn.disabled = false;
            }
        });

        async function saveMatch() {
            if(!winner || !document.getElementById('p1').value) {
                return Swal.fire('ข้อมูลไม่ครบ', 'กรุณาเลือกผู้เล่นและทีมที่ชนะ', 'warning');
            }
            const btn = document.getElementById('saveMatchBtn');
            btn.disabled = true;
            
            const params = `?action=addMatch&p1=${document.getElementById('p1').value}&p2=${document.getElementById('p2').value}&p3=${document.getElementById('p3').value}&p4=${document.getElementById('p4').value}&winner=${winner}`;
            
            await fetch(API_URL + params, { method: 'POST', mode: 'no-cors' });
            Swal.fire('บันทึกผลแล้ว!', '', 'success');
            btn.disabled = false;
            fetchData();
        }

        function renderHistory(matches) {
            const container = document.getElementById('matchHistory');
            container.innerHTML = matches.slice(-5).reverse().map(m => `
                <div class="history-item ${m.winner === 'Team A' ? 'winA' : 'winB'}">
                    <span>${m.p1}+${m.p2} vs ${m.p3}+${m.p4}</span>
                    <span style="color:var(--primary-green)">${m.winner === 'Team A' ? 'A Win' : 'B Win'}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
